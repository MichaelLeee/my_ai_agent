<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; background: #fff; }
    h2 { font-size: 14px; margin-bottom: 12px; color: #1e293b; }
    label { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 4px; margin-top: 8px; }
    input, textarea { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; font-family: inherit; }
    textarea { resize: vertical; min-height: 80px; }
    button { width: 100%; padding: 8px; background: #6366f1; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 12px; }
    button:hover { background: #4f46e5; }
    button:disabled { background: #94a3b8; cursor: default; }
    #status { font-size: 11px; margin-top: 8px; text-align: center; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    #url { font-size: 10px; color: #94a3b8; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <h2>Capture to Second Brain</h2>
  <div id="url"></div>
  <label for="title">Title</label>
  <input type="text" id="title" placeholder="Note title" maxlength="500">
  <label for="content">Content</label>
  <textarea id="content" placeholder="What do you want to remember?"></textarea>
  <label for="tags">Tags (comma-separated)</label>
  <input type="text" id="tags" placeholder="e.g., research, ideas">
  <button id="save">Save to Second Brain</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
